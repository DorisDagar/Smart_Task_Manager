<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Task Manager - Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <h2 class="text-center mb-4">Smart Task Manager</h2>

      <div class="card p-4 shadow-sm">
        <h4>Create Account</h4>
        <form id="registerForm">
          <input type="number" id="u_id" class="form-control mb-3" placeholder="User ID" required>
          <input type="text" id="u_name" class="form-control mb-3" placeholder="Full Name" required>
          <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>
          <input type="password" id="pwd" class="form-control mb-3" placeholder="Password" required>
          <button type="submit" class="btn btn-success w-100">Register</button>
        </form>
        <button class="btn btn-link w-100 mt-2" onclick="window.location.href='/login'">
          Already have an account? Login
        </button>
      </div>
    </div>
  </div>
</div>

<script>
document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const u_id = document.getElementById("u_id").value;
  const u_name = document.getElementById("u_name").value;
  const email = document.getElementById("email").value;
  const pwd = document.getElementById("pwd").value;

  const response = await fetch("http://127.0.0.1:8000/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      u_id: Number(u_id),
      u_name: u_name,
      email: email,
      pwd: pwd
    })
  });

  const result = await response.text();
  alert(result);

  // Optional: Redirect to login if registration is successful
  if (result.includes("Successfully")) {
    window.location.href = "/login";
  }
});
</script>

</body>
</html>
