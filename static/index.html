<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Task Manager - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <h2 class="text-center mb-4">Smart Task Manager</h2>

      <div class="card p-4 shadow-sm">
        <h4>Login</h4>
        <form id="loginForm">
          <input type="number" id="u_id" class="form-control mb-3" placeholder="User ID" required>
          <input type="password" id="pwd" class="form-control mb-3" placeholder="Password" required>
          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <button class="btn btn-link w-100 mt-2" onclick="window.location.href='/register'">
          Don't have an account? Register
        </button>
        
      </div>
    </div>
  </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const u_id = document.getElementById("u_id").value;
  const pwd = document.getElementById("pwd").value;

  const response = await fetch("http://127.0.0.1:8000/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ u_id: Number(u_id), pwd: pwd })
  });

  const result = await response.text();
  console.log("Server says:", result); 

  if (result === '"Login Successful"') {
    
    window.location.href = `/dashboard?user_id=${u_id}`;  // ✅ Redirect to dashboard
  } else {
    alert(result); // show error
  }
});
</script>

</body>
</html>
